name: Self-Maintaining Repository

on:
  push:
    branches:
      - master
      - dev-build
  pull_request:
    branches:
      - master
      - dev-build
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-maintain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history for changelog/diffs
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f .github/scripts/requirements.txt ]; then pip install -r .github/scripts/requirements.txt; fi

      - name: Run Tests
        run: cd android_app && ./gradlew testDebugUnitTest --continue || true

      - name: Run Linting
        run: cd android_app && ./gradlew lint || true

      - name: Dependency Audit
        run: cd android_app && ./gradlew dependencies || true

      - name: Run Repository Analysis
        run: python .github/scripts/analyze_repo.py

      - name: Update Knowledge Graph
        run: python .github/scripts/knowledge_graph.py

      - name: Generate Diagrams
        run: python .github/scripts/generate_diagrams.py

      - name: AI Documentation Agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python .github/scripts/ai_agent.py

      - name: Update README
        run: python .github/scripts/update_readme.py

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update repository documentation and architecture graphs"
          file_pattern: "README.md docs/architecture/* .github/data/*"
