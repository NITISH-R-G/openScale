name: Self-Maintaining Repository

on:
  push:
    branches:
      - master
      - dev-build
  pull_request:
    branches:
      - master
      - dev-build
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-maintain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history for changelog/diffs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f .github/scripts/requirements.txt ]; then pip install -r .github/scripts/requirements.txt; fi

      - name: Run Repository Analysis
        run: python .github/scripts/analyze_repo.py

      - name: Update Knowledge Graph
        run: python .github/scripts/knowledge_graph.py

      - name: Generate Diagrams
        run: python .github/scripts/generate_diagrams.py

      - name: AI Documentation Agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python .github/scripts/ai_agent.py

      - name: Update README
        run: python .github/scripts/update_readme.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md docs/architecture/ .github/data/ || true
          git diff --staged --quiet || git commit -m "chore: auto-update repository documentation and architecture graphs"
          git push
